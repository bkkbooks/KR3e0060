body:
  text: 格致餘論醫家類提要臣等謹案格致餘論一卷元朱震亨撰震亨字彦修金華人受業于羅知悌得劉守真之𫝊其説謂陽易動隂易虧獨重滋隂降火創為陽常有餘隂常不足之論張介賔等攻之不遺餘力然震亨意主補益故諄諄以飲食色欲為箴所立補隂諸丸亦多竒效孫一奎醫㫖緒餘云丹溪生當承平見人多酗酒縱欲精竭火熾復用剛劑以至于斃因為此救時之説後人不察遂以寒凉殺人此不善學丹溪者也其説可謂平允矣是編前有自序云古人以醫為吾儒格物致知之一事故特以是名書葢震亨本儒者受業於許謙之門學醫特其餘事乃性之所近竟不以儒名而以醫名然究較方技者流為能明其理故其言如是戴良九靈山房集有丹溪翁𫝊叙其始末甚詳云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀格致餘論原序金之以善醫名者凡三人曰劉守真氏曰張子和氏曰李明之氏雖其人年之有先後術之有攻補至於惟隂陽五行升䧏生成之理則皆以黄帝内經為宗而莫之有異也張一再傳其後無所聞李雖多門弟子又在中州人有罕知之者獨劉之學授之荆山浮屠師師江南始傳太無羅知悌子杭太無宋寶祐中人受幸穆陵得給事禁中性倨甚無有能承其學者又獨至烏傷朱君始能傳之初君之未從太無也手抄陳師文裴宗元所定大觀二百九十有七方晝夜而習焉既而悟曰故方新病安有能相值者泥是且殺人乃盡棄去渡淛河走吳中尋師而求其説乆之不能得復走宛陵走南徐走建業皆無吳中時纍纍道途間方不知所適忽有以太無為告者遂還杭拜之凡十往返不得通君乃立其門終日不動太無憐其志為敷暢三家之旨而一折以經越數年悉受其學以歸郷之羣醫方泥陳裴學聞君言皆大驚已而又皆大服翕然共尊事之君年既髙所見益粹精其自得者類多前人所未發乃徇門人張翼等請著為書若干篇名之曰格致餘論持以示金華宋濓濓竊受而讀之見其立言深察證詳未嘗不歎君用志之勤也盖當大觀之方盛行世之人烏知有所謂内經之學君獨能﨑嶇數十百里必欲求師而受其説雖險阻艱難更嬰迭挫曽不為之少動所以卒能成其學向使君之志稍變焉烏有今日哉傳曰用志不分其道乃成殆君之謂矣此書其有功於生民者甚大宜與三家所著並傳於世故濓得備書傳學用功之所自於篇端其見君之自序者因不暇及也君名震亨字彦脩許文懿公之髙弟弟子公講學入華山時君即從之遊而聞道最先剛明正直不可干以私其安貧守道雖古君子弗過也而醫又特其一事云至正七年冬十有一月日南至金華宋濓書於浦陽東明山中
